```
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f5f7fb;
        margin: 0;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
    }

    button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #4338ca;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    th, td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        text-align: left;
    }

    th {
        background: #f1f5f9;
    }

    .actions button {
        margin-right: 5px;
        background: #10b981;
    }

    .delete {
        background: #ef4444;
    }

    .section {
        margin-top: 30px;
    }
</style>

</head>
<body>

<div class="container">
    <h1>DocVault</h1>
    
<!-- Upload Form -->
<div class="section">
    <h3>Upload User</h3>
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
</div>

<!-- Users List -->
<div class="section">
    <h3>Users List</h3>
    <button onclick="loadUsers()">Load Users</button>

    <table id="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>File</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>


</div>

<script>
    const API = "http://localhost:8081/user"; // change after deploy

    async function upload() {
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let file = document.getElementById("file").files[0];

        let formData = new FormData();
        formData.append("name", name);
        formData.append("email", email);
        formData.append("file", file);

        await fetch(API + "/uploadUser", {
            method: "POST",
            body: formData
        });

        alert("Uploaded successfully");
        loadUsers();
    }

    async function loadUsers() {
        let res = await fetch(API + "/all");
        let data = await res.json();

        let table = document.querySelector("#table tbody");
        table.innerHTML = "";

        data.forEach(user => {
            table.innerHTML += `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.filePath || ""}</td>
                    <td class="actions">
                        <button onclick="download('${user.filePath}')">Download</button>
                        <button class="delete" onclick="deleteUser('${user.email}')">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function download(filePath) {
        if (!filePath) return alert("No file");
        window.open(API + "/download?fileName=" + filePath.split("/").pop());
    }

    async function deleteUser(email) {
        await fetch(API + "/" + email, { method: "DELETE" });
        loadUsers();
    }
</script>

</body>
</html>
