<!DOCTYPE html>
<html>
<head>
    <title>DocVault</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #3498db;
        }

        .btn-secondary:hover {
            background: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .actions button {
            margin: 3px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Upload Card -->
    <div class="card">
        <h2><center>DocVault</center></h2>
        <p>File Upload & Management</p>

        <form id="uploadForm">
            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="file" id="file" multiple required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <!-- Users List Card -->
    <div class="card">
        <h2>Users List</h2>
        <button class="btn-secondary" onclick="loadUsers()">Load Users</button>

        <table id="userTable">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>File</th>
                <th>Actions</th>
            </tr>
        </table>
    </div>

</div>

<script>
const API = "http://localhost:8080/user";

// Upload
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

  let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let files = document.getElementById("file").files;

    let formData = new FormData();
    formData.append("name", name);
    formData.append("email", email);

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]); // 👈 important: "files"
    }

    await fetch(API + "/uploadMultiple", {
        method: "POST",
        body: formData
    });

    alert("Uploaded Multiple Files");
    loadUsers();
});

// Load users
async function loadUsers() {
    let res = await fetch(API + "/all");
    let users = await res.json();

    let table = document.getElementById("userTable");
    table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>File</th>
            <th>Actions</th>
        </tr>
    `;

    users.forEach(u => {
        let fileName = u.filePath ? u.filePath.split("/").pop() : "";

        table.innerHTML += `
            <tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${fileName}</td>
                <td class="actions">
                    <button class="btn-secondary" onclick="downloadFile('${fileName}')">Download</button>
                    <button class="btn-danger" onclick="deleteUser('${u.email}')">Delete</button>
                </td>
            </tr>
        `;
    });
}

// Download
function downloadFile(fileName) {
    window.open(API + "/download?fileName=" + fileName);
}

// Delete
async function deleteUser(email) {
    await fetch(API + "/delete/" + email, {
        method: "DELETE"
    });

    alert("Deleted");
    loadUsers();
}
</script>

</body>
</html>
